# Production Docker Compose Override for Horizontal Scaling
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This overlay scales the backend and ws_gateway to 2 replicas each,
# adds nginx as a reverse proxy/load balancer, and redis-sentinel for HA.
#
# Prerequisites:
#   - Copy .env.example to .env and fill ALL secrets (no defaults in prod)
#   - Ensure devOps/nginx/nginx.conf exists
#   - Ensure devOps/redis/sentinel.conf exists
#
# Capacity: ~600 concurrent users (2x backend + 2x ws_gateway)
# See devOps/SCALING.md for full documentation.

services:
  # --- Database (override: production tuning) ---
  db:
    container_name: integrador_db_prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c work_mem=16MB
        -c maintenance_work_mem=128MB
        -c max_connections=200
        -c wal_buffers=16MB
        -c checkpoint_completion_target=0.9
        -c random_page_cost=1.1
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M
          cpus: "0.5"

  # --- Redis (override: production tuning, no port exposure) ---
  redis:
    container_name: integrador_redis_prod
    ports: !override []
    command: >
      redis-server
        --appendonly yes
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --tcp-backlog 511
        --timeout 300
        --tcp-keepalive 60
        --save 900 1
        --save 300 10
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"

  # --- Redis Sentinel for HA ---
  redis-sentinel:
    image: redis:7-alpine
    container_name: integrador_redis_sentinel
    command: redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./redis/sentinel.conf:/etc/redis/sentinel.conf:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  # --- Backend replica 1 (override: production mode) ---
  backend:
    container_name: integrador_backend_1
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ISSUER=${JWT_ISSUER}
      - JWT_AUDIENCE=${JWT_AUDIENCE}
      - TABLE_TOKEN_SECRET=${TABLE_TOKEN_SECRET}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES}
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=${JWT_REFRESH_TOKEN_EXPIRE_DAYS}
      - JWT_TABLE_TOKEN_EXPIRE_HOURS=${JWT_TABLE_TOKEN_EXPIRE_HOURS}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - PYTHONPATH=/app/backend
    ports:
      - "8000:8000"
    volumes: !override []
    command: >
      python -m uvicorn rest_api.main:app
        --host 0.0.0.0
        --port 8000
        --workers 4
        --limit-concurrency 100
        --timeout-keep-alive 30
        --access-log
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.5"

  # --- Backend replica 2 ---
  backend-2:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: integrador_backend_2
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ISSUER=${JWT_ISSUER}
      - JWT_AUDIENCE=${JWT_AUDIENCE}
      - TABLE_TOKEN_SECRET=${TABLE_TOKEN_SECRET}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES}
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=${JWT_REFRESH_TOKEN_EXPIRE_DAYS}
      - JWT_TABLE_TOKEN_EXPIRE_HOURS=${JWT_TABLE_TOKEN_EXPIRE_HOURS}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - PYTHONPATH=/app/backend
    ports:
      - "8002:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    command: >
      python -m uvicorn rest_api.main:app
        --host 0.0.0.0
        --port 8000
        --workers 4
        --limit-concurrency 100
        --timeout-keep-alive 30
        --access-log
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.5"

  # --- WS Gateway replica 1 (override: production mode) ---
  ws_gateway:
    container_name: integrador_ws_gateway_1
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ISSUER=${JWT_ISSUER}
      - JWT_AUDIENCE=${JWT_AUDIENCE}
      - TABLE_TOKEN_SECRET=${TABLE_TOKEN_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - PYTHONPATH=/app/backend
    ports:
      - "8001:8001"
    volumes: !override []
    command: >
      python -m uvicorn ws_gateway.main:app
        --host 0.0.0.0
        --port 8001
        --workers 2
        --limit-concurrency 300
        --timeout-keep-alive 65
        --access-log
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.5"

  # --- WS Gateway replica 2 ---
  ws_gateway_2:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: integrador_ws_gateway_2
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ISSUER=${JWT_ISSUER}
      - JWT_AUDIENCE=${JWT_AUDIENCE}
      - TABLE_TOKEN_SECRET=${TABLE_TOKEN_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - PYTHONPATH=/app/backend
    ports:
      - "8003:8001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/ws/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    command: >
      python -m uvicorn ws_gateway.main:app
        --host 0.0.0.0
        --port 8001
        --workers 2
        --limit-concurrency 300
        --timeout-keep-alive 65
        --access-log
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.5"

  # --- Nginx Load Balancer ---
  nginx:
    image: nginx:1.27-alpine
    container_name: integrador_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      backend-2:
        condition: service_healthy
      ws_gateway:
        condition: service_started
      ws_gateway_2:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.25"

  # --- Disable pgAdmin in production ---
  pgadmin:
    profiles:
      - debug
