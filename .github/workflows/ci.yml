name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-lint-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: menu_ops_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r backend/requirements.txt
      - name: Run backend tests
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/menu_ops_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-for-ci-only-32chars!!
          TABLE_TOKEN_SECRET: test-table-secret-ci-only-32ch!!
          ENVIRONMENT: test
        working-directory: backend
        run: python -m pytest tests/ -v --tb=short

  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: Dashboard/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm run test -- --run
      - run: npm run build

  pwa-menu:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pwaMenu
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: pwaMenu/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run test:run
      - run: npm run build

  pwa-waiter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pwaWaiter
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: pwaWaiter/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run test:run
      - run: npm run build
